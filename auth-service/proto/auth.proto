syntax = "proto3";

package auth;

option go_package = "auth-service/internal/grpc/pb";

service AuthService {
    rpc Register(RegisterRequest) returns (AuthResponse);
    
    rpc Login(LoginRequest) returns (AuthResponse);
    
    rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
    
    rpc RecoverPassword(RecoverPasswordRequest) returns (RecoverPasswordResponse);
    
    rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message RegisterRequest {
    string email = 1;
    string first_name = 2;
    string last_name = 3;
    string phone = 4;
    string password = 5;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message ChangePasswordRequest {
    string token = 1;
    string old_password = 2;
    string new_password = 3;
}

message RecoverPasswordRequest {
    string email = 1;
}

message ValidateTokenRequest {
    string token = 1;
}


message AuthResponse {
    bool success = 1;
    string token = 2;
    string user_id = 3;
    string message = 4;
}

message ChangePasswordResponse {
    bool success = 1;
    string message = 2;
}

message  RecoverPasswordResponse {
    bool success = 1;
    string message = 2;
    string imitation_new_password = 3; 
}

message ValidateTokenResponse {
    bool valid = 1;
    string user_id = 2;
    string email = 3;
    string role = 4;
    string error = 5;
}