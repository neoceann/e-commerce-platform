version: "2"
sql:
  - schema: "../migrations"
    queries: "query"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "../internal/repository/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
            nullable: false
          
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
            nullable: true

          - db_type: "date"
            go_type: "time.Time"
            nullable: true

          - db_type: "timestamptz"
            go_type: "time.Time"

          - column: "product.price"
            go_type: "float64"          
            
          - column: "client.gender"
            go_type: "string"