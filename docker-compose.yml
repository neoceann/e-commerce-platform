services:
  # ==================== БАЗЫ ДАННЫХ ====================
  
  shop-db:
    image: postgres:16-alpine
    container_name: shop-db
    environment:
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_pass
      POSTGRES_DB: shop_db
    ports:
      - "5432:5432"
    volumes:
      - shop_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - store-network

  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - store-network

  # ==================== MIGRATIONS ====================
  
  shop-migrate:
    image: migrate/migrate:v4.17.0
    container_name: shop-migrate
    depends_on:
      shop-db:
        condition: service_healthy
    volumes:
      - ./store/migrations:/migrations
    command: -path /migrations -database postgresql://shop_user:shop_pass@shop-db:5432/shop_db?sslmode=disable up
    restart: "no"
    networks:
      - store-network

  auth-migrate:
    image: migrate/migrate:v4.17.0
    container_name: auth-migrate
    depends_on:
      auth-db:
        condition: service_healthy
    volumes:
      - ./auth-service/migrations:/migrations
    command: -path /migrations -database postgresql://auth_user:auth_pass@auth-db:5432/auth_db?sslmode=disable up
    restart: "no"
    networks:
      - store-network

  # ==================== СЕРВИСЫ ====================
  
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    depends_on:
      auth-db:
        condition: service_healthy
      auth-migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: auth_pass
      DB_NAME: auth_db
      GRPC_SERVER_PORT: 50051
      JWT_SECRET: secret-key-change-in-production
      JWT_EXPIRATION_HOURS: 1
      BCRYPT_COST: 12
    ports:
      - "50051:50051"
    restart: unless-stopped
    networks:
      - store-network

  shop-api:
    build:
      context: ./store
      dockerfile: Dockerfile
    container_name: shop-api
    depends_on:
      shop-db:
        condition: service_healthy
      shop-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
    environment:
      DB_HOST: shop-db
      DB_PORT: 5432
      DB_USER: shop_user
      DB_PASSWORD: shop_pass
      DB_NAME: shop_db
      AUTH_SERVICE_ADDR: auth-service:50051
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - store-network

networks:
  store-network:
    driver: bridge

volumes:
  shop_data:
  auth_data: